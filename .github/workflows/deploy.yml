name: 🚀 Deploy AutoGest Pro a GitHub Pages

on:
  push:
    branches:
      - main        # Se dispara automáticamente con cada push a main
  workflow_dispatch: # También permite ejecutarlo manualmente desde GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🏗 Build del proyecto
        run: npm run build
        env:
          # Variables de entorno de Supabase
          # Configúralas en: GitHub repo → Settings → Secrets → Actions
          REACT_APP_SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
          # Evita que warnings rompan el build
          CI: false

      - name: 📤 Subir artefacto de build
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    name: 🌐 Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
